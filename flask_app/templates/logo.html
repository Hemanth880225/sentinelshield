<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SentinelShield — Cyber Defense Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    height:100vh;
    overflow:hidden;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    background:#020617;
    transition: opacity 1.2s ease;
}

/* ---- Particle Canvas ---- */
#particleCanvas{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    z-index:0;
}

/* ---- Scan Line Overlay ---- */
.scanline-overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,255,0.015) 2px,
        rgba(0,255,255,0.015) 4px
    );
    pointer-events:none;
    z-index:1;
    animation: scanMove 8s linear infinite;
}

@keyframes scanMove{
    0%{background-position:0 0}
    100%{background-position:0 100vh}
}

/* ---- Center Content ---- */
.splash-content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    text-align:center;
}

/* ---- Shield Icon ---- */
.shield-icon{
    width:120px;height:120px;
    margin-bottom:30px;
    position:relative;
    animation: shieldFloat 3s ease-in-out infinite;
}

.shield-icon svg{
    width:100%;height:100%;
    filter: drop-shadow(0 0 25px rgba(56,189,248,0.6));
}

@keyframes shieldFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
}

.shield-pulse{
    position:absolute;
    top:50%;left:50%;
    width:140px;height:140px;
    margin:-70px 0 0 -70px;
    border-radius:50%;
    border:2px solid rgba(56,189,248,0.3);
    animation: pulseRing 2s ease-out infinite;
}

@keyframes pulseRing{
    0%{transform:scale(0.8);opacity:1}
    100%{transform:scale(1.8);opacity:0}
}

/* ---- Title ---- */
.splash-title{
    font-size:clamp(42px,6vw,72px);
    font-weight:900;
    letter-spacing:6px;
    color:#fff;
    text-transform:uppercase;
    position:relative;
    animation: glitchIn 1.5s ease forwards;
}

.splash-title span{
    background: linear-gradient(135deg, #38bdf8, #06b6d4, #818cf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

@keyframes glitchIn{
    0%{opacity:0;transform:translateY(30px);filter:blur(10px)}
    60%{opacity:1;transform:translateY(-5px);filter:blur(0)}
    80%{transform:translateY(3px)}
    100%{transform:translateY(0)}
}

/* ---- Subtitle typewriter ---- */
.splash-subtitle{
    font-family:'JetBrains Mono',monospace;
    font-size:16px;
    color:#64748b;
    margin-top:16px;
    letter-spacing:2px;
    border-right:2px solid #38bdf8;
    white-space:nowrap;
    overflow:hidden;
    width:0;
    animation: typewriter 2.5s steps(35) 1s forwards, blink 0.7s step-end infinite 1s;
}

@keyframes typewriter{
    to{width:420px}
}
@keyframes blink{
    50%{border-color:transparent}
}

/* ---- Enter Prompt ---- */
.enter-prompt{
    margin-top:60px;
    font-size:14px;
    color:#475569;
    letter-spacing:3px;
    text-transform:uppercase;
    animation: fadeInUp 1s ease 3s forwards;
    opacity:0;
}

@keyframes fadeInUp{
    to{opacity:1;transform:translateY(0)}
    from{opacity:0;transform:translateY(15px)}
}

.enter-prompt .arrow{
    display:inline-block;
    animation: bounce 1.5s infinite;
    margin-left:8px;
    color:#38bdf8;
}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(5px)}
}

/* ---- Version Badge ---- */
.version-badge{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:#334155;
    letter-spacing:2px;
    z-index:2;
}

/* ---- Fade Out ---- */
body.fade-out{
    opacity:0;
}
</style>
</head>

<body onclick="enterApp()">

<canvas id="particleCanvas"></canvas>
<div class="scanline-overlay"></div>

<div class="splash-content">
    <div class="shield-icon">
        <div class="shield-pulse"></div>
        <img src="/static/images/logo.png" alt="SentinelShield" style="width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 25px rgba(56,189,248,0.6));">
    </div>

    <h1 class="splash-title"><span>SentinelShield</span></h1>
    <p class="splash-subtitle">Autonomous IoT Cyber Defense Platform</p>
    <p class="enter-prompt">Click anywhere to enter <span class="arrow">▼</span></p>
</div>

<div class="version-badge">v2.0 — AGENTIC AI DEFENSE SYSTEM</div>

<script>
/* ---- Particle Background ---- */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let mouse = {x: null, y: null};

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

class Particle{
    constructor(){
        this.reset();
    }
    reset(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 1.5 + 0.5;
        this.opacity = Math.random() * 0.5 + 0.2;
    }
    update(){
        this.x += this.vx;
        this.y += this.vy;
        if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw(){
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(56,189,248,${this.opacity})`;
        ctx.fill();
    }
}

for(let i = 0; i < 120; i++) particles.push(new Particle());

function connectParticles(){
    for(let i = 0; i < particles.length; i++){
        for(let j = i + 1; j < particles.length; j++){
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 140){
                ctx.beginPath();
                ctx.strokeStyle = `rgba(56,189,248,${0.15 * (1 - dist/140)})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
        /* Mouse interaction */
        if(mouse.x){
            const dx = particles[i].x - mouse.x;
            const dy = particles[i].y - mouse.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 180){
                ctx.beginPath();
                ctx.strokeStyle = `rgba(6,182,212,${0.3 * (1 - dist/180)})`;
                ctx.lineWidth = 0.8;
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke();
            }
        }
    }
}

function animate(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    connectParticles();
    requestAnimationFrame(animate);
}
animate();

/* ---- Enter App ---- */
function enterApp(){
    document.body.classList.add('fade-out');
    setTimeout(() => { window.location.href = '/home'; }, 1000);
}
</script>

</body>
</html>
