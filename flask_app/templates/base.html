<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelShield SOC</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">

</head>


<body>

    <!-- ====== SIDEBAR ====== -->
    <nav class="sidebar" id="sidebar">

        <div class="sidebar-brand">
            <img src="/static/images/logo.png" alt="SentinelShield" class="brand-logo" width="32" height="32">
            <span>Sentinel<strong>Shield</strong></span>
        </div>

        <div class="sidebar-section-label">MONITORING</div>

        <ul class="sidebar-nav">
            <li>
                <a href="/dashboard" id="nav-dashboard">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/traffic" id="nav-traffic">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                    <span>Live Traffic</span>
                </a>
            </li>
            <li>
                <a href="/threats" id="nav-threats">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                        <line x1="12" y1="9" x2="12" y2="13" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg>
                    <span>Threats</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-section-label">DEFENSE</div>

        <ul class="sidebar-nav">
            <li>
                <a href="/honeypots" id="nav-honeypots">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
                        <line x1="2" y1="12" x2="22" y2="12" />
                    </svg>
                    <span>Honeypots</span>
                </a>
            </li>
            <li>
                <a href="/agent_logs" id="nav-agent_logs">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                        <line x1="8" y1="21" x2="16" y2="21" />
                        <line x1="12" y1="17" x2="12" y2="21" />
                    </svg>
                    <span>Agent Logs</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="system-health">
                <span class="health-dot"></span>
                <span>System Healthy</span>
            </div>
            <a href="/home" class="sidebar-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                <span>Home</span>
            </a>
        </div>

    </nav>


    <!-- ====== TOP BAR ====== -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <div class="topbar-breadcrumb">
                <span class="breadcrumb-app">SentinelShield</span>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-page" id="pageName">Dashboard</span>
            </div>
        </div>
        <div class="topbar-right">
            <div class="topbar-indicator scan-pulse">
                <span class="scan-dot"></span>
                <span>SCANNING</span>
            </div>
            <div class="topbar-clock" id="topClock"></div>
        </div>
    </header>


    <!-- ====== MAIN CONTENT ====== -->
    <main class="main">

        <div class="scanline-bg"></div>

        {% block content %}
        {% endblock %}

    </main>


    <!-- ====== PAGE DETECTION ====== -->
    <script>
        (function () {
            /* Highlight active nav item */
            const path = window.location.pathname;
            const links = document.querySelectorAll('.sidebar-nav a');
            links.forEach(link => {
                if (link.getAttribute('href') === path) {
                    link.classList.add('active');
                }
            });

            /* Set page name in breadcrumb */
            const nameMap = {
                '/dashboard': 'Dashboard',
                '/traffic': 'Live Traffic',
                '/threats': 'Threat Intel',
                '/honeypots': 'Honeypots',
                '/agent_logs': 'Agent Logs'
            };
            const pgEl = document.getElementById('pageName');
            if (pgEl && nameMap[path]) pgEl.textContent = nameMap[path];

            /* Top bar clock */
            function updateTopClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('topClock').textContent = h + ':' + m + ':' + s;
            }
            setInterval(updateTopClock, 1000);
            updateTopClock();
        })();
    </script>

</body>

</html>
